<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Materials - Sem 6 Notes</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <nav class="navbar glass">
        <div class="logo">
            <img src="logo.png" alt="SMACK" style="width: 32px; height: 32px; border-radius: 8px;">
            <span>SMACK</span>
        </div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="resources.html">Materials</a>
            <a href="admin.html" class="admin-only" style="display: none;">Admin Panel</a>
            <a href="profile.html" class="profile-link" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-main); font-weight: 600;">
                <div id="nav-avatar" style="width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: white;">U</div>
                <span id="nav-user-name">Profile</span>
            </a>
            <a href="index.html" class="logout"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <header class="app-header glass">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <img src="logo.png" alt="SMACK" style="width: 32px; height: 32px; border-radius: 6px;">
            <div id="subject-title" style="font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem;">SMACK Materials</div>
        </div>
        <a href="profile.html" id="nav-avatar-header" style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; text-decoration: none;">U</a>
    </header>

    <div class="container" style="padding-bottom: 5rem;">
        <div id="resource-header" style="margin-bottom: 2rem;">
            <h1 id="header-title">Loading materials...</h1>
            <p style="color: var(--text-muted);">Access syllabus and study materials for this subject.</p>
        </div>

        <div id="syllabus-section" class="collapsible-section glass" style="display: none;">
            <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fas fa-list-ul" style="color: var(--secondary);"></i>
                    <h2>Course Information</h2>
                </div>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div id="syllabus-list" class="collapsible-content syllabus-list">
                <!-- Dynamically populated units -->
            </div>
        </div>

        <div id="important-questions-section" class="collapsible-section glass" style="display: none;">
            <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fas fa-star" style="color: #fbbf24;"></i>
                    <h2>Important Questions</h2>
                </div>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div id="important-questions-list" class="collapsible-content important-questions-grid">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div id="two-marks-section" class="collapsible-section glass" style="display: none;">
            <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fas fa-marker" style="color: var(--primary-light);"></i>
                    <h2>2-Mark Notes</h2>
                </div>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div id="two-marks-list" class="collapsible-content resource-list">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div id="prev-year-section" class="collapsible-section glass" style="display: none;">
            <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fas fa-history" style="color: var(--accent);"></i>
                    <h2>Previous Year Questions</h2>
                </div>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div id="prev-year-list" class="collapsible-content resource-list">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div id="materials-section">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.2rem;">
                <i class="fas fa-book" style="color: var(--primary-light);"></i>
                <h2 style="font-size: 1.4rem;">Study Materials</h2>
            </div>
            <div id="resource-list" class="resource-list">
                <!-- Dynamically populated -->
                <div style="text-align: center; padding: 3rem; color: var(--text-muted); grid-column: 1/-1;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>Fetching materials...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <div class="mobile-nav">
        <a href="home.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-home"></i></a>
        <a href="resources.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-book-open"></i></a>
        <a href="profile.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-user"></i></a>
        <a href="admin.html" id="mobile-admin-btn" class="back-btn" style="background: transparent; border: none; display: none;"><i class="fas fa-cog"></i></a>
    </div>

    <script type="module">
        import { auth, db, fs, doc, getDoc, ref, get, child } from "./firebase-config.js";
        import { subjectMaterials } from "./materials.js";

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const subject = urlParams.get('subject');
            const headerTitle = document.getElementById('header-title');
            const subjectTitle = document.getElementById('subject-title');
            const resourceList = document.getElementById('resource-list');
            const syllabusSection = document.getElementById('syllabus-section');
            const syllabusList = document.getElementById('syllabus-list');
            const importantSection = document.getElementById('important-questions-section');
            const importantList = document.getElementById('important-questions-list');

            console.log("Loading subject:", subject);

            // Navbar User Info - Firestore based
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    try {
                        const userDoc = await getDoc(doc(fs, "users", user.uid));
                        if (userDoc.exists()) {
                            const data = userDoc.data();
                            const name = data.name || "User";
                            const navAvatar = document.getElementById('nav-avatar');
                            const mobileAvatar = document.getElementById('mobile-avatar');
                            
                            if (navAvatar) navAvatar.textContent = name.charAt(0).toUpperCase();
                            if (mobileAvatar) mobileAvatar.textContent = name.charAt(0).toUpperCase();
                            
                            if (data.role === 'admin') {
                                const adminBtn = document.getElementById('mobile-admin-btn');
                                if (adminBtn) adminBtn.style.display = 'flex';
                            }
                        }
                    } catch (e) { 
                        console.error("Profile fetch error:", e); 
                    }
                }
            });

            // Main rendering logic
            try {
                if (subject && subjectMaterials[subject]) {
                    const subjectData = subjectMaterials[subject];
                    console.log("Subject Data found:", subjectData);
                    
                    if (headerTitle) headerTitle.textContent = subjectData.fullName || "Subject Details";
                    if (subjectTitle) subjectTitle.textContent = subject.toUpperCase();

                    // 1. Render Syllabus
                    if (subjectData.syllabus && subjectData.syllabus.length > 0) {
                        syllabusSection.style.display = 'block';
                        syllabusList.innerHTML = '';
                        subjectData.syllabus.forEach((unit) => {
                            const unitCard = document.createElement('div');
                            unitCard.className = 'syllabus-card glass';
                            unitCard.innerHTML = `
                                <div class="syllabus-header" onclick="this.parentElement.classList.toggle('expanded')">
                                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem;">
                                        <i class="fas fa-layer-group" style="color: var(--primary-light); font-size: 0.8rem;"></i>
                                        <div style="font-weight: 700; color: var(--primary-light); font-size: 0.9rem;">Unit ${unit.unit}</div>
                                    </div>
                                    <span style="font-weight: 600; font-family: 'Outfit';">${unit.title}</span>
                                    <i class="fas fa-chevron-down toggle-icon"></i>
                                </div>
                                <div class="syllabus-content">
                                    <p>${unit.topics}</p>
                                </div>
                            `;
                            syllabusList.appendChild(unitCard);
                        });
                    } else {
                        syllabusSection.style.display = 'none';
                    }

                    // 2. Render Important Questions
                    if (subjectData.importantQuestions && subjectData.importantQuestions.length > 0) {
                        importantSection.style.display = 'block';
                        importantList.innerHTML = '';
                        
                        // Check if it uses the new split format
                        const isSplitFormat = subjectData.importantQuestions[0].hasOwnProperty('firstHalf');
                        
                        if (isSplitFormat) {
                            // Desktop Table
                            const tableWrapper = document.createElement('div');
                            tableWrapper.className = 'important-table-wrapper';
                            tableWrapper.innerHTML = `
                                <table class="important-table">
                                    <thead>
                                        <tr>
                                            <th style="width: 80px; text-align: center;">Unit</th>
                                            <th>First Half</th>
                                            <th>Second Half</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${subjectData.importantQuestions.map(item => `
                                            <tr>
                                                <td class="unit-col">${item.unit}</td>
                                                <td>
                                                    <ul>
                                                        ${item.firstHalf.map(q => `<li>${q}</li>`).join('')}
                                                    </ul>
                                                </td>
                                                <td>
                                                    <ul>
                                                        ${item.secondHalf.map(q => `<li>${q}</li>`).join('')}
                                                    </ul>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            `;
                            importantList.appendChild(tableWrapper);

                            // Mobile View (Image 1 inspired)
                            const mobileView = document.createElement('div');
                            mobileView.className = 'mobile-important-view';
                            subjectData.importantQuestions.forEach(item => {
                                const card = document.createElement('div');
                                card.className = 'unit-split-card';
                                card.innerHTML = `
                                    <div class="unit-number-side">${item.unit}</div>
                                    <div class="unit-content-side">
                                        <div class="half-box">
                                            <span class="half-title">First Half</span>
                                            <ul class="half-list">
                                                ${item.firstHalf.map(q => `<li>${q}</li>`).join('')}
                                            </ul>
                                        </div>
                                        <div class="half-box">
                                            <span class="half-title">Second Half</span>
                                            <ul class="half-list">
                                                ${item.secondHalf.map(q => `<li>${q}</li>`).join('')}
                                            </ul>
                                        </div>
                                    </div>
                                `;
                                mobileView.appendChild(card);
                            });
                            importantList.appendChild(mobileView);
                            
                            // Adjust layout class
                            importantList.classList.remove('important-questions-grid');
                        } else {
                            // Fallback to grid for old format
                            importantList.classList.add('important-questions-grid');
                            subjectData.importantQuestions.forEach(item => {
                                const qCard = document.createElement('div');
                                qCard.className = 'important-card glass';
                                qCard.innerHTML = `
                                    <div style="padding: 1.2rem;">
                                        <div style="display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem;">
                                            <span style="font-size: 0.7rem; font-weight: 800; background: rgba(251, 191, 36, 0.2); color: #fbbf24; padding: 2px 8px; border-radius: 4px;">${item.unit.toUpperCase()}</span>
                                            <h4 style="font-size: 0.95rem; margin: 0; display: flex; align-items: center; gap: 0.4rem;">
                                                <i class="fas fa-lightbulb" style="color: #fbbf24; font-size: 0.8rem;"></i>
                                                Key Topics
                                            </h4>
                                        </div>
                                        <ul style="margin: 0; padding-left: 1.2rem; color: var(--text-muted); font-size: 0.9rem;">
                                            ${item.questions.map(q => `<li style="margin-bottom: 0.4rem;">${q}</li>`).join('')}
                                        </ul>
                                    </div>
                                `;
                                importantList.appendChild(qCard);
                            });
                        }
                    } else {
                        importantSection.style.display = 'none';
                    }

                    // 2b. Render Previous Year Questions
                    const prevYearSection = document.getElementById('prev-year-section');
                    const prevYearList = document.getElementById('prev-year-list');
                    if (subjectData.previousYearQuestions && subjectData.previousYearQuestions.length > 0) {
                        prevYearSection.style.display = 'block';
                        prevYearList.innerHTML = '';
                        subjectData.previousYearQuestions.forEach(item => {
                            const unit = { name: item.year, file: item.file };
                            const card = createResourceCard(unit, subject);
                            prevYearList.appendChild(card);
                        });
                    } else {
                        prevYearSection.style.display = 'none';
                    }

                    // 3. Render 2-Mark Notes & Study Materials
                    const allMaterials = subjectData.materials || [];
                    const twoMarkFiles = allMaterials.filter(m => 
                        m.file.toLowerCase().includes('2m') || 
                        m.file.toLowerCase().includes('2mark') ||
                        m.name.toLowerCase().includes('2-mark') ||
                        m.name.toLowerCase().includes('2 mark')
                    );
                    const genericMaterials = allMaterials.filter(m => !twoMarkFiles.includes(m));

                    // 3a. Render 2-Mark Section
                    const twoMarksSection = document.getElementById('two-marks-section');
                    const twoMarksList = document.getElementById('two-marks-list');
                    if (twoMarkFiles.length > 0) {
                        twoMarksSection.style.display = 'block';
                        twoMarksList.innerHTML = '';
                        twoMarkFiles.forEach(unit => {
                            const card = createResourceCard(unit, subject);
                            twoMarksList.appendChild(card);
                        });
                    } else {
                        twoMarksSection.style.display = 'none';
                    }

                    // 3b. Render Generic Study Materials
                    resourceList.innerHTML = '';
                    if (genericMaterials.length > 0) {
                        genericMaterials.forEach(unit => {
                            const card = createResourceCard(unit, subject);
                            resourceList.appendChild(card);
                        });
                    } else {
                        resourceList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">No general materials available yet.</div>';
                    }

                    // Helper function to create resource cards
                    function createResourceCard(unit, subjectKey) {
                        const card = document.createElement('div');
                        card.className = 'resource-card glass';
                        card.onclick = () => {
                            location.href = `viewer.html?file=${encodeURIComponent(unit.file)}&title=${encodeURIComponent(unit.name)}&subject=${subjectKey}`;
                        };
                        
                        const tagHTML = unit.isUpdated ? `<span style="font-size: 0.65rem; font-weight: 800; background: rgba(16, 185, 129, 0.15); color: #10b981; padding: 2px 6px; border-radius: 4px; white-space: nowrap;">UPDATED</span>` : '';

                        card.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <i class="fas fa-file-pdf" style="font-size: 1.5rem; color: var(--primary-light);"></i>
                                <div>
                                    <span style="font-weight: 600; display: block;">${unit.name}</span>
                                    <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 2px;">PDF Document</span>
                                </div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                ${tagHTML}
                                <div class="arrow-btn">
                                    <i class="fas fa-chevron-right"></i>
                                </div>
                            </div>
                        `;
                        return card;
                    }
                } else {
                    console.warn("Subject not found or missing from database");
                    if (headerTitle) headerTitle.textContent = "Subject Not Found";
                    resourceList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">This subject is currently unavailable or the link is broken.</div>';
                }
            } catch (error) {
                console.error("Critical rendering error:", error);
                resourceList.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #ef4444;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>Something went wrong while loading the materials. Please try refreshing the page.</p>
                </div>`;
            }
        });
    </script>
</body>
</html>
