<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Materials - Sem 6 Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="app-header glass">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <img src="logo.png" alt="SMACK" style="width: 32px; height: 32px; border-radius: 6px;">
            <div id="subject-title" style="font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem;">SMACK Materials</div>
        </div>
        <a href="profile.html" id="nav-avatar" style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; text-decoration: none;">U</a>
    </header>

    <div class="container" style="padding-top: 1rem; padding-bottom: 5rem;">
        <div id="resource-header" style="margin-bottom: 2rem;">
            <h1 id="header-title">Loading materials...</h1>
            <p style="color: var(--text-muted);">Access syllabus and study materials for this subject.</p>
        </div>

        <div id="syllabus-section" style="display: none; margin-bottom: 2.5rem;">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.2rem;">
                <i class="fas fa-list-ul" style="color: var(--secondary);"></i>
                <h2 style="font-size: 1.4rem;">Course Syllabus</h2>
            </div>
            <div id="syllabus-list" class="syllabus-list">
                <!-- Dynamically populated units -->
            </div>
        </div>

        <div id="important-questions-section" style="display: none; margin-bottom: 2.5rem;">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.2rem;">
                <i class="fas fa-star" style="color: #fbbf24;"></i>
                <h2 style="font-size: 1.4rem;">Important Questions</h2>
            </div>
            <div id="important-questions-list" class="important-questions-grid">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div id="materials-section">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.2rem;">
                <i class="fas fa-book" style="color: var(--primary-light);"></i>
                <h2 style="font-size: 1.4rem;">Study Materials</h2>
            </div>
            <div id="resource-list" class="resource-list">
                <!-- Dynamically populated -->
                <div style="text-align: center; padding: 3rem; color: var(--text-muted); grid-column: 1/-1;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>Fetching materials...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <div class="mobile-nav">
        <a href="home.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-home"></i></a>
        <a href="resources.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-book-open"></i></a>
        <a href="profile.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-user"></i></a>
        <a href="admin.html" id="mobile-admin-btn" class="back-btn" style="background: transparent; border: none; display: none;"><i class="fas fa-cog"></i></a>
    </div>

    <script type="module">
        import { auth, db, fs, doc, getDoc, ref, get, child } from "./firebase-config.js";
        import { subjectMaterials } from "./materials.js";

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const subject = urlParams.get('subject');
            const headerTitle = document.getElementById('header-title');
            const subjectTitle = document.getElementById('subject-title');
            const resourceList = document.getElementById('resource-list');
            const syllabusSection = document.getElementById('syllabus-section');
            const syllabusList = document.getElementById('syllabus-list');
            const importantSection = document.getElementById('important-questions-section');
            const importantList = document.getElementById('important-questions-list');

            console.log("Loading subject:", subject);

            // Navbar User Info - Firestore based
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    try {
                        const userDoc = await getDoc(doc(fs, "users", user.uid));
                        if (userDoc.exists()) {
                            const data = userDoc.data();
                            const name = data.name || "User";
                            const navAvatar = document.getElementById('nav-avatar');
                            const mobileAvatar = document.getElementById('mobile-avatar');
                            
                            if (navAvatar) navAvatar.textContent = name.charAt(0).toUpperCase();
                            if (mobileAvatar) mobileAvatar.textContent = name.charAt(0).toUpperCase();
                            
                            if (data.role === 'admin') {
                                const adminBtn = document.getElementById('mobile-admin-btn');
                                if (adminBtn) adminBtn.style.display = 'flex';
                            }
                        }
                    } catch (e) { 
                        console.error("Profile fetch error:", e); 
                    }
                }
            });

            // Main rendering logic
            try {
                if (subject && subjectMaterials[subject]) {
                    const subjectData = subjectMaterials[subject];
                    console.log("Subject Data found:", subjectData);
                    
                    if (headerTitle) headerTitle.textContent = subjectData.fullName || "Subject Details";
                    if (subjectTitle) subjectTitle.textContent = subject.toUpperCase();

                    // 1. Render Syllabus
                    if (subjectData.syllabus && subjectData.syllabus.length > 0) {
                        syllabusSection.style.display = 'block';
                        syllabusList.innerHTML = '';
                        subjectData.syllabus.forEach((unit) => {
                            const unitCard = document.createElement('div');
                            unitCard.className = 'syllabus-card glass';
                            unitCard.innerHTML = `
                                <div class="syllabus-header" onclick="this.parentElement.classList.toggle('expanded')">
                                    <div style="display: flex; align-items: center; gap: 1rem;">
                                        <span class="unit-badge">${unit.unit}</span>
                                        <span style="font-weight: 600; font-family: 'Outfit';">${unit.title}</span>
                                    </div>
                                    <i class="fas fa-chevron-down toggle-icon"></i>
                                </div>
                                <div class="syllabus-content">
                                    <p>${unit.topics}</p>
                                </div>
                            `;
                            syllabusList.appendChild(unitCard);
                        });
                    } else {
                        syllabusSection.style.display = 'none';
                    }

                    // 2. Render Important Questions
                    if (subjectData.importantQuestions && subjectData.importantQuestions.length > 0) {
                        importantSection.style.display = 'block';
                        importantList.innerHTML = '';
                        subjectData.importantQuestions.forEach(item => {
                            const qCard = document.createElement('div');
                            qCard.className = 'important-card glass';
                            qCard.innerHTML = `
                                <div style="padding: 1.2rem;">
                                    <div style="display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem;">
                                        <span style="font-size: 0.7rem; font-weight: 800; background: rgba(251, 191, 36, 0.2); color: #fbbf24; padding: 2px 8px; border-radius: 4px;">${item.unit.toUpperCase()}</span>
                                        <h4 style="font-size: 0.95rem; margin: 0;">Key Topics</h4>
                                    </div>
                                    <ul style="margin: 0; padding-left: 1.2rem; color: var(--text-muted); font-size: 0.9rem;">
                                        ${item.questions.map(q => `<li style="margin-bottom: 0.4rem;">${q}</li>`).join('')}
                                    </ul>
                                </div>
                            `;
                            importantList.appendChild(qCard);
                        });
                    } else {
                        importantSection.style.display = 'none';
                    }

                    // 3. Render Materials
                    resourceList.innerHTML = '';
                    if (subjectData.materials && subjectData.materials.length > 0) {
                        subjectData.materials.forEach(unit => {
                            const card = document.createElement('div');
                            card.className = 'resource-card glass';
                            card.onclick = () => {
                                location.href = `viewer.html?file=${encodeURIComponent(unit.file)}&title=${encodeURIComponent(unit.name)}&subject=${subject}`;
                            };
                            
                            card.innerHTML = `
                                <div style="display: flex; align-items: center; gap: 1rem;">
                                    <i class="fas fa-file-pdf" style="font-size: 1.5rem; color: var(--primary-light);"></i>
                                    <div>
                                        <span style="font-weight: 600; display: block;">${unit.name}</span>
                                        <span style="font-size: 0.75rem; color: var(--text-muted);">PDF Document</span>
                                    </div>
                                </div>
                                <div class="arrow-btn">
                                    <i class="fas fa-chevron-right"></i>
                                </div>
                            `;
                            resourceList.appendChild(card);
                        });
                    } else {
                        resourceList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">No materials available yet.</div>';
                    }
                } else {
                    console.warn("Subject not found or missing from database");
                    if (headerTitle) headerTitle.textContent = "Subject Not Found";
                    resourceList.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem;">This subject is currently unavailable or the link is broken.</div>';
                }
            } catch (error) {
                console.error("Critical rendering error:", error);
                resourceList.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #ef4444;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>Something went wrong while loading the materials. Please try refreshing the page.</p>
                </div>`;
            }
        });
    </script>
</body>
</html>
