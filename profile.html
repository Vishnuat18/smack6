<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - Sem 6 Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <header class="app-header glass">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <img src="logo.png" alt="SMACK" style="width: 32px; height: 32px; border-radius: 6px;">
            <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem;">My Profile</div>
        </div>
        <div id="nav-avatar-header" style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-weight: 700;">?</div>
    </header>

    <div class="container profile-container">
        <div class="profile-grid">
            <!-- Profile Main Card -->
            <div class="profile-card glass">
                <div class="profile-avatar" id="profile-avatar-char">U</div>
                <div class="profile-info">
                    <h1 id="display-name">Loading...</h1>
                    <p id="display-email">email@example.com</p>
                    <div class="badge" id="display-role" style="display: inline-block; margin-top: 0.5rem;">Student</div>
                </div>
                
                <div class="profile-details-section">
                    <p class="section-label">ACCOUNT DETAILS</p>
                    <div class="detail-item">
                        <i class="fas fa-calendar-alt"></i>
                        <div>
                            <span class="detail-title">Joined On</span>
                            <span id="display-joined" class="detail-value">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profile Actions & Stats -->
            <div class="profile-actions-column">
                <!-- Edit Info -->
                <div class="glass action-card">
                    <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-container">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="edit-name-input" placeholder="Your full name">
                        </div>
                    </div>
                    <button class="btn btn-primary" id="update-profile-btn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <p id="update-status" class="status-msg"></p>
                </div>

                <!-- Stats -->
                <div class="glass action-card">
                    <h3><i class="fas fa-chart-pie"></i> Portal Activity</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <span class="stat-value">12</span>
                            <span class="stat-label">FILES VIEWED</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-value" style="color: var(--accent);">5</span>
                            <span class="stat-label">SUBJECTS EXPLORED</span>
                        </div>
                    </div>
                </div>

                <div class="glass logout-card">
                    <button class="btn logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Sign Out from SMACK
                    </button>
                <!-- Feedback Section -->
                <div class="glass action-card">
                    <h3><i class="fas fa-comment-dots" style="color: var(--secondary);"></i> Send Feedback</h3>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">Have a suggestion or found a bug? Let us know!</p>
                    <div class="form-group">
                        <textarea id="feedback-text" rows="3" placeholder="Type your feedback here..." 
                            style="width: 100%; padding: 0.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text-main); font-family: inherit; resize: vertical;"></textarea>
                    </div>
                    <button class="btn btn-primary" id="send-feedback-btn" style="background: linear-gradient(to right, var(--secondary), #f472b6);">
                        <i class="fas fa-paper-plane"></i> Submit Feedback
                    </button>
                    <p id="feedback-status" class="status-msg" style="margin-top: 0.8rem;"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <div class="mobile-nav">
        <a href="home.html" class="back-nav-btn"><i class="fas fa-home"></i></a>
        <a href="resources.html" class="back-nav-btn"><i class="fas fa-book-open"></i></a>
        <a href="profile.html" class="active-nav-btn"><i class="fas fa-user"></i></a>
        <a href="admin.html" id="mobile-admin-btn" class="back-nav-btn" style="display: none;"><i class="fas fa-cog"></i></a>
    </div>

    <style>
        .profile-container {
            max-width: 900px;
            padding-top: 2rem;
            padding-bottom: 7rem;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }
        .profile-details-section {
            text-align: left;
            border-top: 1px solid var(--glass-border);
            padding-top: 1.5rem;
            margin-top: 1rem;
        }
        .section-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .detail-item i {
            color: var(--primary-light);
            font-size: 1.1rem;
        }
        .detail-title {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .detail-value {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .profile-actions-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .action-card {
            padding: 1.8rem;
            border-radius: var(--radius-md);
        }
        .action-card h3 {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .action-card h3 i {
            color: var(--primary-light);
        }
        .input-container input {
            padding-left: 2.8rem;
        }
        .status-msg {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.8rem;
            display: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 1.2rem;
            border-radius: var(--radius-md);
            text-align: center;
            border: 1px solid var(--glass-border);
        }
        .stat-value {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-light);
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .logout-card {
            padding: 1rem;
            border-radius: var(--radius-md);
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            width: 100%;
        }
        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Responsive Navigation Overrides */
        .back-nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .active-nav-btn {
            background: var(--primary);
            color: white;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        @media (max-width: 768px) {
            .navbar {
                display: none;
            }
            .profile-mobile-header {
                display: flex;
            }
            .profile-container {
                padding-top: 1.5rem;
                padding-bottom: 6rem;
            }
            .profile-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .profile-card {
                padding: 2.5rem 1.5rem;
            }
            .action-card {
                padding: 1.5rem;
            }
            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>

    <script type="module" src="script.js"></script>
    <script type="module">
        import { auth, fs, doc, getDoc, setDoc, updateDoc, collection, addDoc, serverTimestamp } from "./firebase-config.js";

        document.addEventListener('DOMContentLoaded', () => {
            const updateBtn = document.getElementById('update-profile-btn');
            const editInput = document.getElementById('edit-name-input');
            const displayName = document.getElementById('display-name');
            const displayEmail = document.getElementById('display-email');
            const displayRole = document.getElementById('display-role');
            const displayJoined = document.getElementById('display-joined');
            const avatarChar = document.getElementById('profile-avatar-char');
            const navAvatar = document.getElementById('nav-avatar');
            const navName = document.getElementById('nav-user-name');
            const updateStatus = document.getElementById('update-status');

            // Admin Email for fallback
            const ADMIN_EMAIL = 'vishnurajan24766@gmail.com';

            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    displayEmail.textContent = user.email;
                    
                    // Fallback name if DB is loading
                    if (displayName.textContent === "Loading...") {
                        displayName.textContent = user.email.split('@')[0];
                        avatarChar.textContent = user.email.charAt(0).toUpperCase();
                    }

                    // Fallback Role
                    const fallbackRole = user.email === ADMIN_EMAIL ? 'admin' : 'student';
                    displayRole.textContent = fallbackRole.charAt(0).toUpperCase() + fallbackRole.slice(1);

                    try {
                        const userDoc = await getDoc(doc(fs, "users", user.uid));
                        if (userDoc.exists()) {
                            const data = userDoc.data();
                            const name = data.name || user.email.split('@')[0];
                            const role = data.role || fallbackRole;
                            const createdAt = data.createdAt ? new Date(data.createdAt).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }) : "Recently";
                            
                            displayName.textContent = name;
                            editInput.value = name;
                            displayRole.textContent = role.charAt(0).toUpperCase() + role.slice(1);
                            displayJoined.textContent = createdAt;
                            avatarChar.textContent = name.charAt(0).toUpperCase();

                            // Sync Navbar
                            if (navAvatar) navAvatar.textContent = name.charAt(0).toUpperCase();
                            const navHeaderAvatar = document.getElementById('nav-avatar-header');
                            if (navHeaderAvatar) navHeaderAvatar.textContent = name.charAt(0).toUpperCase();
                            if (navName) navName.textContent = name.split(' ')[0];

                            // Admin UI logic
                            syncAdminLinks(role);
                        } else {
                            console.log("No profile found event, using fallbacks.");
                            displayJoined.textContent = "New Member";
                            syncAdminLinks(fallbackRole);
                        }
                    } catch (error) {
                        console.error("Error fetching profile:", error);
                        displayJoined.textContent = "Error loading";
                    }
                } else {
                    window.location.href = 'index.html';
                }
            });

            function syncAdminLinks(role) {
                const adminLinks = document.querySelectorAll('a[href="admin.html"]');
                const mobileAdmin = document.getElementById('mobile-admin-btn');
                if (role === 'admin') {
                    adminLinks.forEach(link => link.style.display = 'flex');
                    if (mobileAdmin) mobileAdmin.style.display = 'flex';
                } else {
                    adminLinks.forEach(link => link.style.display = 'none');
                    if (mobileAdmin) mobileAdmin.style.display = 'none';
                }
            }

            updateBtn.addEventListener('click', async () => {
                const user = auth.currentUser;
                const newName = editInput.value.trim();
                
                if (user && newName) {
                    updateBtn.disabled = true;
                    updateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                    updateStatus.style.display = "none";
                    
                    try {
                        // Use setDoc with merge:true to avoid "document not found" errors
                        // This handles both initial creation and updates
                        const userRef = doc(fs, "users", user.uid);
                        const updateData = {
                            name: newName,
                            email: user.email,
                            // Ensure role is preserved or set if it's a new doc
                            role: user.email === ADMIN_EMAIL ? 'admin' : 'student'
                        };

                        await setDoc(userRef, updateData, { merge: true });
                        
                        updateStatus.textContent = "Profile updated successfully!";
                        updateStatus.style.color = "var(--accent)";
                        updateStatus.style.display = "block";
                        
                        // Update UI
                        displayName.textContent = newName;
                        avatarChar.textContent = newName.charAt(0).toUpperCase();
                        if (navAvatar) navAvatar.textContent = newName.charAt(0).toUpperCase();
                        const navHeaderAvatar = document.getElementById('nav-avatar-header');
                        if (navHeaderAvatar) navHeaderAvatar.textContent = newName.charAt(0).toUpperCase();
                        if (navName) navName.textContent = newName.split(' ')[0];

                        setTimeout(() => { updateStatus.style.display = "none"; }, 3000);
                    } catch (error) {
                        console.error("Update error:", error);
                        updateStatus.textContent = "Failed: " + (error.code === 'permission-denied' ? "Access Denied (Security Rules)" : error.message);
                        updateStatus.style.color = "#ef4444";
                        updateStatus.style.display = "block";
                    } finally {
                        updateBtn.disabled = false;
                        updateBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
                    }
                }
            });

            // Feedback Logic
            const feedbackBtn = document.getElementById('send-feedback-btn');
            const feedbackText = document.getElementById('feedback-text');
            const feedbackStatus = document.getElementById('feedback-status');

            feedbackBtn.addEventListener('click', async () => {
                const user = auth.currentUser;
                const text = feedbackText.value.trim();

                if (!text) {
                    feedbackStatus.textContent = "Please enter some feedback.";
                    feedbackStatus.style.color = "#ef4444";
                    feedbackStatus.style.display = "block";
                    return;
                }

                feedbackBtn.disabled = true;
                feedbackBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

                try {
                    await addDoc(collection(fs, "feedback"), {
                        userId: user.uid,
                        userName: displayName.textContent,
                        userEmail: user.email,
                        message: text,
                        timestamp: serverTimestamp()
                    });

                    feedbackStatus.textContent = "Feedback sent! Thank you.";
                    feedbackStatus.style.color = "var(--accent)";
                    feedbackStatus.style.display = "block";
                    feedbackText.value = "";
                    setTimeout(() => { feedbackStatus.style.display = "none"; }, 5000);
                } catch (error) {
                    console.error("Feedback error:", error);
                    feedbackStatus.textContent = "Failed to send feedback.";
                    feedbackStatus.style.color = "#ef4444";
                    feedbackStatus.style.display = "block";
                } finally {
                    feedbackBtn.disabled = false;
                    feedbackBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Feedback';
                }
            });
        });
    </script>
</body>
</html>
