<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMACK - Login</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <!-- Login Form Section -->
            <div id="login-section">
                <div class="auth-header">
                    <img id="logo" src="logo.png" alt="SMACK Logo" style="width: 80px; height: 80px; margin: 0 auto 1.5rem; display: block; border-radius: 1rem; box-shadow: var(--shadow-md);">
                    <h1>SMACK</h1>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">Semester 6 Students' Academic Knowledge</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Username (Email)</label>
                        <div class="input-container">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="Enter your email" required style="padding-left: 2.5rem;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-container">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="••••••••" required style="padding-left: 2.5rem;">
                            <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('login-password', this)"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span>Login</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <div class="auth-footer">
                        <p>Don't have an account? <a href="#" id="show-signup">Create one</a></p>
                    </div>
                </form>
            </div>

            <!-- Signup Form Section (Hidden by default) -->
            <div id="signup-section" style="display: none;">
                <div class="auth-header">
                    <h1>Create Account</h1>
                </div>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <div class="input-container">
                            <i class="fas fa-user"></i>
                            <input type="text" id="signup-name" placeholder="John Doe" required style="padding-left: 2.5rem;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Username (Email)</label>
                        <div class="input-container">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signup-email" placeholder="email@example.com" required style="padding-left: 2.5rem;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <div class="input-container">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signup-password" placeholder="••••••••" required style="padding-left: 2.5rem;">
                            <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('signup-password', this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <div class="input-container">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="signup-confirm" placeholder="••••••••" required style="padding-left: 2.5rem;">
                            <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('signup-confirm', this)"></i>
                        </div>
                    </div>
                    
                    <!-- Captcha Section -->
                    <div class="form-group">
                        <label>Security Check</label>
                        <div class="captcha-row">
                            <div id="captcha-display" class="captcha-code"></div>
                            <button type="button" class="btn glass" id="refresh-captcha" style="width: auto; padding: 0.5rem 1rem;">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                        <input type="text" id="signup-captcha" placeholder="Enter code above" required style="margin-top: 0.5rem;">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span>Sign Up</span>
                        <i class="fas fa-user-plus"></i>
                    </button>
                    <div class="auth-footer">
                        <p>Already have an account? <a href="#" id="show-login">Sign in</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
