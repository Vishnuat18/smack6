<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sem 6 Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <header class="app-header glass">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <img src="logo.png" alt="SMACK" style="width: 32px; height: 32px; border-radius: 6px;">
            <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem;">SMACK Admin</div>
        </div>
        <div class="badge" style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2);">Live Stats</div>
    </header>

    <div class="container" style="padding-top: 1rem; padding-bottom: 5rem;">
        <div class="dashboard-header" style="margin-bottom: 2rem;">
            <h1>Management Overview</h1>
            <p style="color: var(--text-muted);">Real-time statistics and portal analytics for the admin.</p>
        </div>

        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
            <div class="stat-card glass" style="padding: 1.5rem; border-radius: var(--radius-md); text-align: center;">
                <h2 id="stat-users" style="font-size: 2rem; color: var(--primary-light);">...</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Total Users</p>
            </div>
            <div class="stat-card glass" style="padding: 1.5rem; border-radius: var(--radius-md); text-align: center;">
                <h2 style="font-size: 2rem; color: var(--secondary);">42</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Materials</p>
            </div>
            <div class="stat-card glass" style="padding: 1.5rem; border-radius: var(--radius-md); text-align: center;">
                <h2 style="font-size: 2rem; color: var(--accent);">6</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Subjects</p>
            </div>
        </div>

        <div class="glass" style="padding: 1.5rem; border-radius: var(--radius-lg);">
            <h3 style="margin-bottom: 1rem;"><i class="fas fa-bolt" style="color: #fbbf24;"></i> Quick Actions</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;">
                <a href="admin_users.html" class="menu-item glass" style="padding: 1rem; text-decoration: none; display: flex; align-items: center; gap: 1rem; border-radius: var(--radius-sm); color: var(--text-main);">
                    <i class="fas fa-users" style="color: var(--primary-light);"></i>
                    <span>Manage Users</span>
                </a>
                <a href="admin_upload.html" class="menu-item glass" style="padding: 1rem; text-decoration: none; display: flex; align-items: center; gap: 1rem; border-radius: var(--radius-sm); color: var(--text-main);">
                    <i class="fas fa-cloud-upload-alt" style="color: var(--secondary);"></i>
                    <span>Upload New</span>
                </a>
            </div>
        </div>

        <!-- Feedback Display Section -->
        <div class="glass" style="padding: 1.5rem; border-radius: var(--radius-lg); margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem;">
                <h3 style="margin: 0;"><i class="fas fa-comments" style="color: var(--secondary);"></i> User Feedback</h3>
                <span id="feedback-count" class="badge" style="background: rgba(236, 72, 153, 0.1); color: var(--secondary);">0 Total</span>
            </div>
            <div id="feedback-list" style="display: flex; flex-direction: column; gap: 1rem; max-height: 400px; overflow-y: auto; padding-right: 0.5rem;" class="no-scrollbar">
                <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.5rem; margin-bottom: 0.5rem;"></i>
                    <p>Loading feedback...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Mobile Nav -->
    <div class="mobile-nav">
        <a href="admin.html" class="back-btn" style="background: var(--primary);"><i class="fas fa-chart-pie"></i></a>
        <a href="admin_users.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-users"></i></a>
        <a href="admin_upload.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-cloud-upload"></i></a>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module">
        import { auth, fs, doc, getDoc, collection, getDocs, query, orderBy } from "./firebase-config.js";

        document.addEventListener('DOMContentLoaded', () => {
            // Guard Logic: Check Firestore role
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    try {
                        const userDoc = await getDoc(doc(fs, "users", user.uid));
                        if (userDoc.exists() && userDoc.data().role === 'admin') {
                            syncDashboard();
                        } else {
                            location.href = "home.html";
                        }
                    } catch (error) {
                        console.error("Admin check error:", error);
                        location.href = "home.html";
                    }
                } else {
                    location.href = "index.html";
                }
            });

            async function syncDashboard() {
                const statsUsers = document.getElementById('stat-users');
                const statsMaterials = document.querySelectorAll('.stat-card h2')[1];
                const statsSubjects = document.querySelectorAll('.stat-card h2')[2];

                try {
                    // 1. Fetch total users from Firestore
                    const querySnapshot = await getDocs(collection(fs, "users"));
                    statsUsers.textContent = querySnapshot.size;

                    // 2. Calculate materials and subjects from materials.js
                    const subjects = Object.keys(subjectMaterials);
                    let totalMaterials = 0;
                    subjects.forEach(sub => {
                        if (subjectMaterials[sub].materials) {
                            totalMaterials += subjectMaterials[sub].materials.length;
                        }
                    });

                    statsSubjects.textContent = subjects.length;
                    statsMaterials.textContent = totalMaterials;

                    // 3. Fetch and render feedback
                    syncFeedback();
                } catch (error) {
                    console.error("Error fetching stats:", error);
                    statsUsers.textContent = "Err";
                }
            }

            async function syncFeedback() {
                const feedbackList = document.getElementById('feedback-list');
                const feedbackCount = document.getElementById('feedback-count');

                try {
                    const q = query(collection(fs, "feedback"), orderBy("timestamp", "desc"));
                    const querySnapshot = await getDocs(q);
                    
                    feedbackCount.textContent = `${querySnapshot.size} Total`;

                    if (querySnapshot.empty) {
                        feedbackList.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">No feedback received yet.</div>';
                        return;
                    }

                    feedbackList.innerHTML = '';
                    querySnapshot.forEach((doc) => {
                        const fb = doc.data();
                        const date = fb.timestamp ? new Date(fb.timestamp.toDate()).toLocaleString() : "Recently";
                        
                        const fbCard = document.createElement('div');
                        fbCard.className = 'glass';
                        fbCard.style.padding = '1rem';
                        fbCard.style.borderRadius = 'var(--radius-sm)';
                        fbCard.style.border = '1px solid var(--glass-border)';
                        fbCard.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <i class="fas fa-user-circle" style="color: var(--primary-light);"></i>
                                    <div style="font-weight: 700; color: var(--primary-light); font-size: 0.9rem;">${fb.userName || 'User'}</div>
                                </div>
                                <div style="font-size: 0.7rem; color: var(--text-muted);">${date}</div>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <i class="fas fa-quote-left" style="font-size: 0.7rem; color: var(--secondary); margin-top: 0.3rem;"></i>
                                <p style="font-size: 0.9rem; margin: 0; color: var(--text-main); line-height: 1.4; flex: 1;">${fb.message}</p>
                            </div>
                            <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem; display: flex; align-items: center; gap: 0.4rem;">
                                <i class="fas fa-envelope-open" style="font-size: 0.6rem;"></i>
                                ${fb.userEmail}
                            </div>
                        `;
                        feedbackList.appendChild(fbCard);
                    });
                } catch (error) {
                    console.error("Error fetching feedback:", error);
                    feedbackList.innerHTML = '<div style="text-align: center; padding: 2rem; color: #ef4444;">Error loading feedback.</div>';
                }
            }
        });
    </script>
</body>
</html>
