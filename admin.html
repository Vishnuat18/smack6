<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Sem 6 Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="app-header glass">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="home.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <img src="logo.png" alt="SMACK" style="width: 32px; height: 32px; border-radius: 6px;">
            <div style="font-family: 'Outfit'; font-weight: 700; font-size: 1.1rem;">SMACK Admin</div>
        </div>
        <div class="badge" style="background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2);">Live Stats</div>
    </header>

    <div class="container" style="padding-top: 1rem; padding-bottom: 5rem;">
        <div class="dashboard-header" style="margin-bottom: 2rem;">
            <h1>Management Overview</h1>
            <p style="color: var(--text-muted);">Real-time statistics and portal analytics for the admin.</p>
        </div>

        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
            <div class="stat-card glass" style="padding: 1.5rem; border-radius: var(--radius-md); text-align: center;">
                <h2 id="stat-users" style="font-size: 2rem; color: var(--primary-light);">...</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Total Users</p>
            </div>
            <div class="stat-card glass" style="padding: 1.5rem; border-radius: var(--radius-md); text-align: center;">
                <h2 style="font-size: 2rem; color: var(--secondary);">42</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Materials</p>
            </div>
            <div class="stat-card glass" style="padding: 1.5rem; border-radius: var(--radius-md); text-align: center;">
                <h2 style="font-size: 2rem; color: var(--accent);">6</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Subjects</p>
            </div>
        </div>

        <div class="glass" style="padding: 1.5rem; border-radius: var(--radius-lg);">
            <h3 style="margin-bottom: 1rem;"><i class="fas fa-bolt" style="color: #fbbf24;"></i> Quick Actions</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;">
                <a href="admin_users.html" class="menu-item glass" style="padding: 1rem; text-decoration: none; display: flex; align-items: center; gap: 1rem; border-radius: var(--radius-sm); color: var(--text-main);">
                    <i class="fas fa-users" style="color: var(--primary-light);"></i>
                    <span>Manage Users</span>
                </a>
                <a href="admin_upload.html" class="menu-item glass" style="padding: 1rem; text-decoration: none; display: flex; align-items: center; gap: 1rem; border-radius: var(--radius-sm); color: var(--text-main);">
                    <i class="fas fa-cloud-upload-alt" style="color: var(--secondary);"></i>
                    <span>Upload New</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Admin Mobile Nav -->
    <div class="mobile-nav">
        <a href="admin.html" class="back-btn" style="background: var(--primary);"><i class="fas fa-chart-pie"></i></a>
        <a href="admin_users.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-users"></i></a>
        <a href="admin_upload.html" class="back-btn" style="background: transparent; border: none;"><i class="fas fa-cloud-upload"></i></a>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module">
        import { auth, db, ref, onValue, get, child } from "./firebase-config.js";

        document.addEventListener('DOMContentLoaded', () => {
            // Guard Logic: Only vishnurajan24766@gmail.com is admin
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    if (user.email !== 'vishnurajan24766@gmail.com') {
                        location.href = "home.html";
                    } else {
                        syncDashboard();
                    }
                }
            });

            function syncDashboard() {
                const statsUsers = document.getElementById('stat-users');
                onValue(ref(db, 'users'), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        statsUsers.textContent = Object.keys(data).length;
                    }
                });
            }
        });
    </script>
</body>
</html>
