<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer - Sem 6 Notes</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body, html {
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            flex-direction: column;
        }
        .viewer-header {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            padding: 0.6rem 1rem;
            padding-top: calc(0.6rem + env(safe-area-inset-top, 0px));
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 2000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }
        .viewer-title {
            font-family: 'Outfit';
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1; /* Allow title to grow */
            max-width: 250px;
        }
        
        #pdf-container {
            flex: 1;
            margin-top: 0px; /* Minimal gap as requested */
            margin-bottom: 125px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding: 0 0.5rem 0.5rem; /* Remove top padding */
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: #0f172a;
        }
        
        .main-canvas-wrapper {
            position: relative;
            transition: transform 0.1s ease-out, opacity 0.3s ease-out;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform-origin: center center;
            touch-action: none;
            margin: auto 0;
            width: 95%; /* Boxed look */
            max-width: 800px;
            display: flex;
            justify-content: center;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0; /* Hidden initially */
            pointer-events: none;
        }

        .main-canvas-wrapper.sliding-left {
            transform: translateX(-50px);
            opacity: 0;
        }

        .main-canvas-wrapper.sliding-right {
            transform: translateX(50px);
            opacity: 0;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto !important; /* Force aspect ratio compliance */
            background: white;
        }

        /* Bottom Bar Styling */
        .bottom-nav-bar {
            position: fixed;
            bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            left: 10px;
            right: 10px;
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            z-index: 2000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
        }

        .slider-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 1rem;
        }

        input[type="range"] {
            flex: 1;
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: var(--transition);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--primary-light);
        }

        .thumbnail-bar {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding: 0.5rem;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }

        .thumbnail-bar::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .thumbnail-item {
            flex: 0 0 80px;
            height: 110px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .thumbnail-item.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-5px);
        }

        .thumbnail-item canvas {
            width: 100%;
            height: 80px;
            object-fit: cover;
        }

        .thumbnail-item .page-label {
            font-size: 0.7rem;
            padding: 2px 0;
            font-weight: 600;
        }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        .s6-loader {
            width: 80px;
            height: 80px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .s6-loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--primary);
            animation: s6-spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .s6-loader-ring-inner {
            position: absolute;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-bottom-color: var(--secondary);
            animation: s6-spin-reverse 1s linear infinite;
        }

        .s6-loader-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            color: white;
            text-shadow: 0 0 15px var(--primary);
            z-index: 2;
            letter-spacing: -1px;
        }

        @keyframes s6-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes s6-spin-reverse {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        .loading-text {
            font-family: 'Outfit';
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
            background: linear-gradient(to right, #fff, var(--primary-light), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .eye-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .eye-btn:hover {
            background: var(--primary);
            border-color: var(--primary-light);
        }

        @media (max-width: 768px) {
            .viewer-header {
                padding: 0.6rem 0.8rem;
                gap: 0.5rem;
            }
            .viewer-header div:first-child {
                gap: 0.6rem !important;
            }
            .viewer-title {
                max-width: 160px;
                font-size: 0.95rem;
            }
            .viewer-header img {
                display: none; /* Hide logo on mobile to save space */
            }
            #page-indicator {
                padding: 0.3rem 0.6rem !important;
                font-size: 0.7rem !important;
            }
            .eye-btn {
                width: 34px;
                height: 34px;
                font-size: 0.85rem;
            }
            #pdf-container {
                padding: 0.4rem;
            }
            .bottom-nav-bar {
                padding: 0.5rem;
                gap: 0.5rem;
            }
            .slider-container {
                padding: 0 0.5rem;
                gap: 0.6rem;
            }
            .thumbnail-item {
                flex: 0 0 55px;
                height: 75px;
            }
            .thumbnail-item canvas {
                height: 55px;
            }
            .thumbnail-item .page-label {
                font-size: 0.6rem;
            }
        }

        /* Extreme small devices */
        @media (max-width: 380px) {
            .viewer-title {
                max-width: 80px;
            }
            #full-screen-toggle {
                display: none; /* Hide fullscreen on very small screens */
            }
        }
    </style>
</head>
<body>
    <header class="viewer-header glass">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a id="back-link" href="#" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <img src="logo.png" alt="SMACK" style="width: 28px; height: 28px; border-radius: 4px;">
            <div id="viewer-title" class="viewer-title">SMACK Material</div>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <div id="page-indicator" class="glass" style="padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700;">
                <span id="page-num">1</span> / <span id="page-count">-</span>
            </div>
            <a id="download-link" href="#" download class="eye-btn" title="Download">
                <i class="fas fa-download"></i>
            </a>
            <div id="full-screen-toggle" class="eye-btn" title="Full Screen">
                <i class="fas fa-expand"></i>
            </div>
        </div>
    </header>

    <div id="pdf-container" class="no-scrollbar">
        <div id="loading-overlay" class="loading-overlay">
            <div class="s6-loader">
                <div class="s6-loader-ring"></div>
                <div class="s6-loader-ring-inner"></div>
                <div class="s6-loader-text">S6</div>
            </div>
            <p id="loading-status" class="loading-text">Initializing S6 Engine...</p>
        </div>
        <div id="canvas-wrapper" class="main-canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <!-- New Bottom Navigation Bar -->
    <div class="bottom-nav-bar glass">
        <div class="slider-container">
            <span style="font-size: 0.75rem; font-weight: 600;">1</span>
            <input type="range" id="page-slider" min="1" max="1" value="1">
            <span id="max-page-label" style="font-size: 0.75rem; font-weight: 600;">-</span>
        </div>
        <div id="thumbnail-bar" class="thumbnail-bar">
            <!-- Thumbnails injected here -->
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        const { pdfjsLib } = globalThis;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null,
            scale = 1.3,
            canvas = document.getElementById('pdf-canvas'),
            ctx = canvas.getContext('2d'),
            canvasWrapper = document.getElementById('canvas-wrapper');

        // Zoom & Pan State
        let currentScale = 1;
        let initialDistance = 0;
        let isPanning = false;
        let startX, startY;
        let translateX = 0, translateY = 0;

        // Render the main page
        const renderPage = (num, direction = null) => {
            if (pageIsRendering) {
                pageNumIsPending = num;
                return;
            }
            
            pageIsRendering = true;

            // Apply slide effect
            if (direction === 'next') canvasWrapper.classList.add('sliding-left');
            if (direction === 'prev') canvasWrapper.classList.add('sliding-right');

            setTimeout(() => {
                pdfDoc.getPage(num).then(page => {
                    const viewport = page.getViewport({ scale });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderCtx = {
                        canvasContext: ctx,
                        viewport
                    };

                    page.render(renderCtx).promise.then(() => {
                        pageIsRendering = false;
                        
                        // Clear animation classes and trigger fade-in
                        canvasWrapper.classList.remove('sliding-left', 'sliding-right');
                        
                        if (pageNumIsPending !== null) {
                            renderPage(pageNumIsPending);
                            pageNumIsPending = null;
                        }
                    });

                    // Update UI state
                    document.getElementById('page-num').textContent = num;
                    document.getElementById('page-slider').value = num;
                    updateActiveThumbnail(num);
                    
                    // Reset zoom on page change
                    resetZoom();
                });
            }, direction ? 150 : 0);
        };

        const resetZoom = () => {
            currentScale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        };

        const updateTransform = () => {
            canvasWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        };

        const updateActiveThumbnail = (num) => {
            const thumbs = document.querySelectorAll('.thumbnail-item');
            thumbs.forEach(t => t.classList.remove('active'));
            const activeThumb = document.getElementById(`thumb-${num}`);
            if (activeThumb) {
                activeThumb.classList.add('active');
                activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        };

        const renderThumbnails = () => {
            const thumbBar = document.getElementById('thumbnail-bar');
            thumbBar.innerHTML = '';
            
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const thumbItem = document.createElement('div');
                thumbItem.className = 'thumbnail-item';
                thumbItem.id = `thumb-${i}`;
                thumbItem.innerHTML = `
                    <canvas id="thumb-canvas-${i}"></canvas>
                    <div class="page-label">${i}</div>
                `;
                thumbItem.onclick = () => {
                    pageNum = i;
                    renderPage(i);
                };
                thumbBar.appendChild(thumbItem);

                // Render thumbnail canvas
                pdfDoc.getPage(i).then(page => {
                    const canvasT = document.getElementById(`thumb-canvas-${i}`);
                    const ctxT = canvasT.getContext('2d');
                    const viewportT = page.getViewport({ scale: 0.2 });
                    canvasT.height = viewportT.height;
                    canvasT.width = viewportT.width;
                    page.render({ canvasContext: ctxT, viewport: viewportT });
                });
            }
        };

        // Touch Swipe detection
        let touchStartX = 0;
        let touchEndX = 0;

        const handleSwipe = () => {
            const threshold = 100;
            if (touchEndX < touchStartX - threshold) {
                // Swipe Left -> Next Page
                if (pageNum < pdfDoc.numPages) {
                    pageNum++;
                    renderPage(pageNum, 'next');
                }
            }
            if (touchEndX > touchStartX + threshold) {
                // Swipe Right -> Prev Page
                if (pageNum > 1) {
                    pageNum--;
                    renderPage(pageNum, 'prev');
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');
            const title = urlParams.get('title');
            const subject = urlParams.get('subject');

            const backLink = document.getElementById('back-link');
            const viewerTitle = document.getElementById('viewer-title');
            const downloadLink = document.getElementById('download-link');
            const fullScreenBtn = document.getElementById('full-screen-toggle');
            const loadingOverlay = document.getElementById('loading-overlay');
            const pageSlider = document.getElementById('page-slider');

            if (file) {
                const url = decodeURIComponent(file);
                viewerTitle.textContent = title ? decodeURIComponent(title) : 'Material';
                downloadLink.href = url;
                if (subject) backLink.href = `subject_details.html?subject=${subject}`;

                const loadingStatus = document.getElementById('loading-status');
                const startTime = Date.now();
                const minLoadingTime = 3000; // 3 seconds minimum

                // Handle '#' or Uploaded soon
                if (url === '#' || (title && title.toLowerCase().includes('uploaded soon'))) {
                    setTimeout(() => {
                        loadingOverlay.innerHTML = `
                            <div style="text-align: center; animation: fadeIn 0.5s ease-out;">
                                <i class="fas fa-clock" style="font-size: 3rem; color: var(--primary-light); margin-bottom: 1.5rem; display: block;"></i>
                                <h2 style="font-family: 'Outfit'; font-weight: 700; font-size: 1.8rem; margin-bottom: 0.5rem; color: white;">Upload soon...</h2>
                                <p style="color: var(--text-muted);">This resource is being prepared by our team.</p>
                                <a href="subject_details.html?subject=${subject}" class="glass" style="display: inline-block; margin-top: 2rem; padding: 0.8rem 1.5rem; border-radius: 12px; color: white; text-decoration: none; font-weight: 600;">
                                    <i class="fas fa-arrow-left"></i> Go Back
                                </a>
                            </div>
                        `;
                    }, minLoadingTime);
                    return;
                }

                loadingStatus.textContent = "Fetching S6 Material...";

                pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
                    const elapsed = Date.now() - startTime;
                    const remaining = Math.max(0, minLoadingTime - elapsed);

                    setTimeout(() => {
                        pdfDoc = pdfDoc_;
                        document.getElementById('page-count').textContent = pdfDoc.numPages;
                        document.getElementById('max-page-label').textContent = pdfDoc.numPages;
                        pageSlider.max = pdfDoc.numPages;
                        
                        loadingOverlay.style.display = 'none';
                        canvasWrapper.style.opacity = '1';
                        canvasWrapper.style.pointerEvents = 'auto';
                        renderPage(pageNum);
                        renderThumbnails();
                    }, remaining);
                }).catch(err => {
                    console.error('Error loading PDF:', err);
                    const elapsed = Date.now() - startTime;
                    const remaining = Math.max(0, minLoadingTime - elapsed);

                    setTimeout(() => {
                        loadingOverlay.innerHTML = `
                            <div style="text-align: center; color: #ef4444;">
                                <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                                <p style="font-weight: 600;">Error loading S6 Material.</p>
                                <p style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--text-muted);">Please check your connection or try again later.</p>
                            </div>
                        `;
                    }, remaining);
                });
            }

            pageSlider.oninput = function() {
                pageNum = parseInt(this.value);
                renderPage(pageNum);
            };

            fullScreenBtn.onclick = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    fullScreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                } else {
                    document.exitFullscreen();
                    fullScreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            };

            // Advanced Touch Handling (Pinch & Pan)
            canvasWrapper.addEventListener('touchstart', e => {
                if (e.touches.length === 2) {
                    // Pinch Start
                    initialDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                } else if (e.touches.length === 1) {
                    // Pan Start (only if zoomed)
                    if (currentScale > 1) {
                        isPanning = true;
                        startX = e.touches[0].pageX - translateX;
                        startY = e.touches[0].pageY - translateY;
                    }
                    touchStartX = e.touches[0].screenX;
                }
            });

            canvasWrapper.addEventListener('touchmove', e => {
                if (e.touches.length === 2) {
                    // Pinching
                    e.preventDefault();
                    const currentDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const zoomFactor = currentDistance / initialDistance;
                    currentScale = Math.min(Math.max(1, currentScale * zoomFactor), 4);
                    initialDistance = currentDistance;
                    updateTransform();
                } else if (e.touches.length === 1 && isPanning) {
                    // Panning
                    e.preventDefault();
                    translateX = e.touches[0].pageX - startX;
                    translateY = e.touches[0].pageY - startY;
                    updateTransform();
                }
            }, { passive: false });

            canvasWrapper.addEventListener('touchend', e => {
                if (e.touches.length < 2) initialDistance = 0;
                if (e.touches.length === 0) {
                    isPanning = false;
                    touchEndX = e.changedTouches[0].screenX;
                    if (currentScale === 1) handleSwipe();
                }
            });

            // Keyboard navigation
            window.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') {
                    if (pageNum > 1) { pageNum--; renderPage(pageNum, 'prev'); }
                }
                if (e.key === 'ArrowRight') {
                    if (pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum, 'next'); }
                }
            });
        });
    </script>
</body>
</html>
