<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer - Sem 6 Notes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            flex-direction: column;
        }
        .viewer-header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            flex-shrink: 0; /* Prevent header from shrinking */
        }
        .viewer-title {
            font-family: 'Outfit';
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        
        #pdf-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            padding: 0; /* Remove padding for true edge-to-edge look */
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: #0f172a;
        }
        
        .main-canvas-wrapper {
            position: relative;
            transition: transform 0.1s ease-out, opacity 0.2s ease-out;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            transform-origin: center center;
            touch-action: none;
            margin: auto 0; /* Center vertically if PDF is short */
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .main-canvas-wrapper.sliding-left {
            transform: translateX(-50px);
            opacity: 0;
        }

        .main-canvas-wrapper.sliding-right {
            transform: translateX(50px);
            opacity: 0;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto !important; /* Force aspect ratio compliance */
            background: white;
        }

        /* Bottom Bar Styling */
        .bottom-nav-bar {
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            z-index: 100;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
        }

        .slider-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 1rem;
        }

        input[type="range"] {
            flex: 1;
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: var(--transition);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--primary-light);
        }

        .thumbnail-bar {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
            padding: 0.5rem;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }

        .thumbnail-bar::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .thumbnail-item {
            flex: 0 0 80px;
            height: 110px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .thumbnail-item.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-5px);
        }

        .thumbnail-item canvas {
            width: 100%;
            height: 80px;
            object-fit: cover;
        }

        .thumbnail-item .page-label {
            font-size: 0.7rem;
            padding: 2px 0;
            font-weight: 600;
        }

        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .eye-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .eye-btn:hover {
            background: var(--primary);
            border-color: var(--primary-light);
        }

        @media (max-width: 768px) {
            .viewer-header {
                padding: 0.6rem 0.8rem;
                gap: 0.5rem;
            }
            .viewer-header div:first-child {
                gap: 0.6rem !important;
            }
            .viewer-title {
                max-width: 110px;
                font-size: 0.85rem;
            }
            .viewer-header img {
                display: none; /* Hide logo on mobile to save space */
            }
            #page-indicator {
                padding: 0.3rem 0.6rem !important;
                font-size: 0.7rem !important;
            }
            .eye-btn {
                width: 34px;
                height: 34px;
                font-size: 0.85rem;
            }
            #pdf-container {
                padding: 0.4rem;
            }
            .bottom-nav-bar {
                padding: 0.5rem;
                gap: 0.5rem;
            }
            .slider-container {
                padding: 0 0.5rem;
                gap: 0.6rem;
            }
            .thumbnail-item {
                flex: 0 0 55px;
                height: 75px;
            }
            .thumbnail-item canvas {
                height: 55px;
            }
            .thumbnail-item .page-label {
                font-size: 0.6rem;
            }
        }

        /* Extreme small devices */
        @media (max-width: 380px) {
            .viewer-title {
                max-width: 80px;
            }
            #full-screen-toggle {
                display: none; /* Hide fullscreen on very small screens */
            }
        }
    </style>
</head>
<body>
    <header class="viewer-header glass">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a id="back-link" href="#" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <img src="logo.png" alt="SMACK" style="width: 28px; height: 28px; border-radius: 4px;">
            <div id="viewer-title" class="viewer-title">SMACK Material</div>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <div id="page-indicator" class="glass" style="padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700;">
                <span id="page-num">1</span> / <span id="page-count">-</span>
            </div>
            <a id="download-link" href="#" download class="eye-btn" title="Download">
                <i class="fas fa-download"></i>
            </a>
            <div id="full-screen-toggle" class="eye-btn" title="Full Screen">
                <i class="fas fa-expand"></i>
            </div>
        </div>
    </header>

    <div id="pdf-container" class="no-scrollbar">
        <div id="loading-overlay" class="loading-overlay">
            <div class="spinner"></div>
            <p>Loading PDF...</p>
        </div>
        <div id="canvas-wrapper" class="main-canvas-wrapper">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </div>

    <!-- New Bottom Navigation Bar -->
    <div class="bottom-nav-bar glass">
        <div class="slider-container">
            <span style="font-size: 0.75rem; font-weight: 600;">1</span>
            <input type="range" id="page-slider" min="1" max="1" value="1">
            <span id="max-page-label" style="font-size: 0.75rem; font-weight: 600;">-</span>
        </div>
        <div id="thumbnail-bar" class="thumbnail-bar">
            <!-- Thumbnails injected here -->
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        const { pdfjsLib } = globalThis;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumIsPending = null,
            scale = 1.3,
            canvas = document.getElementById('pdf-canvas'),
            ctx = canvas.getContext('2d'),
            canvasWrapper = document.getElementById('canvas-wrapper');

        // Zoom & Pan State
        let currentScale = 1;
        let initialDistance = 0;
        let isPanning = false;
        let startX, startY;
        let translateX = 0, translateY = 0;

        // Render the main page
        const renderPage = (num, direction = null) => {
            if (pageIsRendering) {
                pageNumIsPending = num;
                return;
            }
            
            pageIsRendering = true;

            // Apply slide effect
            if (direction === 'next') canvasWrapper.classList.add('sliding-left');
            if (direction === 'prev') canvasWrapper.classList.add('sliding-right');

            setTimeout(() => {
                pdfDoc.getPage(num).then(page => {
                    const viewport = page.getViewport({ scale });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderCtx = {
                        canvasContext: ctx,
                        viewport
                    };

                    page.render(renderCtx).promise.then(() => {
                        pageIsRendering = false;
                        
                        // Clear animation classes and trigger fade-in
                        canvasWrapper.classList.remove('sliding-left', 'sliding-right');
                        
                        if (pageNumIsPending !== null) {
                            renderPage(pageNumIsPending);
                            pageNumIsPending = null;
                        }
                    });

                    // Update UI state
                    document.getElementById('page-num').textContent = num;
                    document.getElementById('page-slider').value = num;
                    updateActiveThumbnail(num);
                    
                    // Reset zoom on page change
                    resetZoom();
                });
            }, direction ? 150 : 0);
        };

        const resetZoom = () => {
            currentScale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        };

        const updateTransform = () => {
            canvasWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        };

        const updateActiveThumbnail = (num) => {
            const thumbs = document.querySelectorAll('.thumbnail-item');
            thumbs.forEach(t => t.classList.remove('active'));
            const activeThumb = document.getElementById(`thumb-${num}`);
            if (activeThumb) {
                activeThumb.classList.add('active');
                activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        };

        const renderThumbnails = () => {
            const thumbBar = document.getElementById('thumbnail-bar');
            thumbBar.innerHTML = '';
            
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const thumbItem = document.createElement('div');
                thumbItem.className = 'thumbnail-item';
                thumbItem.id = `thumb-${i}`;
                thumbItem.innerHTML = `
                    <canvas id="thumb-canvas-${i}"></canvas>
                    <div class="page-label">${i}</div>
                `;
                thumbItem.onclick = () => {
                    pageNum = i;
                    renderPage(i);
                };
                thumbBar.appendChild(thumbItem);

                // Render thumbnail canvas
                pdfDoc.getPage(i).then(page => {
                    const canvasT = document.getElementById(`thumb-canvas-${i}`);
                    const ctxT = canvasT.getContext('2d');
                    const viewportT = page.getViewport({ scale: 0.2 });
                    canvasT.height = viewportT.height;
                    canvasT.width = viewportT.width;
                    page.render({ canvasContext: ctxT, viewport: viewportT });
                });
            }
        };

        // Touch Swipe detection
        let touchStartX = 0;
        let touchEndX = 0;

        const handleSwipe = () => {
            const threshold = 100;
            if (touchEndX < touchStartX - threshold) {
                // Swipe Left -> Next Page
                if (pageNum < pdfDoc.numPages) {
                    pageNum++;
                    renderPage(pageNum, 'next');
                }
            }
            if (touchEndX > touchStartX + threshold) {
                // Swipe Right -> Prev Page
                if (pageNum > 1) {
                    pageNum--;
                    renderPage(pageNum, 'prev');
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const file = urlParams.get('file');
            const title = urlParams.get('title');
            const subject = urlParams.get('subject');

            const backLink = document.getElementById('back-link');
            const viewerTitle = document.getElementById('viewer-title');
            const downloadLink = document.getElementById('download-link');
            const fullScreenBtn = document.getElementById('full-screen-toggle');
            const loadingOverlay = document.getElementById('loading-overlay');
            const pageSlider = document.getElementById('page-slider');

            if (file) {
                const url = decodeURIComponent(file);
                viewerTitle.textContent = title ? decodeURIComponent(title) : 'Material';
                downloadLink.href = url;
                if (subject) backLink.href = `subject_details.html?subject=${subject}`;

                pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
                    pdfDoc = pdfDoc_;
                    document.getElementById('page-count').textContent = pdfDoc.numPages;
                    document.getElementById('max-page-label').textContent = pdfDoc.numPages;
                    pageSlider.max = pdfDoc.numPages;
                    
                    loadingOverlay.style.display = 'none';
                    renderPage(pageNum);
                    renderThumbnails();
                }).catch(err => {
                    console.error('Error loading PDF:', err);
                    loadingOverlay.innerHTML = `<p style="color: #ef4444;">Error loading PDF.</p>`;
                });
            }

            pageSlider.oninput = function() {
                pageNum = parseInt(this.value);
                renderPage(pageNum);
            };

            fullScreenBtn.onclick = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    fullScreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
                } else {
                    document.exitFullscreen();
                    fullScreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            };

            // Advanced Touch Handling (Pinch & Pan)
            canvasWrapper.addEventListener('touchstart', e => {
                if (e.touches.length === 2) {
                    // Pinch Start
                    initialDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                } else if (e.touches.length === 1) {
                    // Pan Start (only if zoomed)
                    if (currentScale > 1) {
                        isPanning = true;
                        startX = e.touches[0].pageX - translateX;
                        startY = e.touches[0].pageY - translateY;
                    }
                    touchStartX = e.touches[0].screenX;
                }
            });

            canvasWrapper.addEventListener('touchmove', e => {
                if (e.touches.length === 2) {
                    // Pinching
                    e.preventDefault();
                    const currentDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const zoomFactor = currentDistance / initialDistance;
                    currentScale = Math.min(Math.max(1, currentScale * zoomFactor), 4);
                    initialDistance = currentDistance;
                    updateTransform();
                } else if (e.touches.length === 1 && isPanning) {
                    // Panning
                    e.preventDefault();
                    translateX = e.touches[0].pageX - startX;
                    translateY = e.touches[0].pageY - startY;
                    updateTransform();
                }
            }, { passive: false });

            canvasWrapper.addEventListener('touchend', e => {
                if (e.touches.length < 2) initialDistance = 0;
                if (e.touches.length === 0) {
                    isPanning = false;
                    touchEndX = e.changedTouches[0].screenX;
                    if (currentScale === 1) handleSwipe();
                }
            });

            // Keyboard navigation
            window.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') {
                    if (pageNum > 1) { pageNum--; renderPage(pageNum, 'prev'); }
                }
                if (e.key === 'ArrowRight') {
                    if (pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum, 'next'); }
                }
            });
        });
    </script>
</body>
</html>
